    <script>
        (function () {
            var el = document.getElementById('s7-clock');
            if (!el) return;
            function tick() {
                var d = new Date();
                var h = d.getHours();
                var m = d.getMinutes();
                var ampm = h >= 12 ? 'PM' : 'AM';
                h = h % 12; if (h === 0) h = 12;
                el.textContent = h + ':' + (m < 10 ? '0' + m : m) + ' ' + ampm;
            }
            tick();
            setInterval(tick, 30000);
        })();
    </script>
</body>
<script>
    // baidu analysis
    var _hmt = _hmt || [];
    (function () {
        var hm = document.createElement("script");
        hm.src = "https://hm.baidu.com/hm.js?6a7309420b13551443ee226a20c9f7b2";
        var s = document.getElementsByTagName("script")[0];
        s.parentNode.insertBefore(hm, s);
    })();

    // // 获取主题切换按钮和body的引用
    const toggle = document.getElementById('theme-toggle');
    const body = document.body;

    // // 获取主题切换复选框和图标元素
    const moonIcon = document.getElementById('theme-icon-moon');
    const sunIcon = document.getElementById('theme-icon-sun');

    // 检测系统主题偏好
    const prefersDarkScheme = window.matchMedia('(prefers-color-scheme: dark)').matches;

    // 设置用户偏好的函数（可以存储在localStorage或Cookie中）
    function setUserPreference(preference) {
        // 示例：存储在localStorage中
        localStorage.setItem('themePreference', preference);
    }

    // 页面加载时设置初始主题
    function setInitialTheme() {
        const savedPreference = localStorage.getItem('themePreference');

        if (savedPreference) {
            // 如果保存了主题，则使用
            if (savedPreference === 'dark') {
                setToDark();
            } else {
                setToLight();
            }
        } else {
            // 如果从未保存过主题，则使用系统默认主题
            if (prefersDarkScheme) {
                setToDark();
            } else {
                setToLight();
            }
        }
    }

    // 监听主题切换
    if (toggle) {
        toggle.addEventListener('change', () => {
            if (sunIcon.style.display === 'block') {
                setToLight();
            } else {
                setToDark();
            }
        });
    }

    function setToDark() {
        moonIcon.style.display = 'none';
        sunIcon.style.display = 'block';
        body.style.backgroundColor = '#181818'; // 直接设置背景颜色
        body.classList.add('dark-theme')
        body.classList.remove('light-theme')
        setUserPreference('dark')
    }

    function setToLight() {
        moonIcon.style.display = 'block';
        sunIcon.style.display = 'none';
        // body.style.backgroundColor = '#ffffff'; // 直接设置背景颜色
        body.style.backgroundColor = '#f5f5f5'; // 直接设置背景颜色
        // body.style.color = '#333333'; // 直接设置文字颜色
        body.classList.add('light-theme')
        body.classList.remove('dark-theme')

        // 其他样式的直接应用...
        setUserPreference('light')
    }

    setInitialTheme()

</script>
