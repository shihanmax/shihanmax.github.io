{% extends "base.html" %}

{% block content %}
<!-- 独立的悬浮目录面板 -->
<aside class="toc-panel" id="toc-panel">
    <div class="toc-header">
        <h3>目录</h3>
        <button id="toggle-toc" class="toc-toggle" title="折叠/展开目录">
            <span class="toc-icon">≡</span>
        </button>
    </div>
    <div id="toc-content" class="toc-content">
        <div id="toc-list" class="toc-list"></div>
    </div>
</aside>

<div class="post-container">
    <!-- 主内容区域 -->
    <article class="c-article">
        <header class="c-article__header">
            <!-- 编辑按钮（仅对管理员显示） -->
            <div class="c-article__actions admin-only" style="display: none;">
                <a href="{{ url_for('edit_post', year=post.year, month=post.month, slug=post.slug) }}" 
                   class="btn btn-edit" 
                   title="编辑文章">
                    编辑
                </a>
            </div>
        </header>

        <div class="c-article__main" id="article-content">
            {{ post.rendered_content | safe }}
        </div>

        <footer class="c-article__footer">
            {% if post.tags %}
            <div class="c-article__tags">
                <p>Tags: 
                    {% for tag in post.tags %}
                    <a href="{{ url_for('tags') }}#{{ tag }}" class="tag-link">{{ tag }}</a>
                    {% if not loop.last %}, {% endif %}
                    {% endfor %}
                </p>
            </div>
            {% endif %}
        </footer>
    </article>
</div>

<script>
// 目录管理器
class TOCManager {
    constructor() {
        this.tocPanel = document.getElementById('toc-panel');
        this.tocList = document.getElementById('toc-list');
        this.tocContent = document.getElementById('toc-content');
        this.toggleButton = document.getElementById('toggle-toc');
        this.tocIcon = document.querySelector('.toc-icon');
        this.articleContent = document.getElementById('article-content');
        
        this.isCollapsed = false;
        this.headings = [];
        this.headingPositions = [];
        
        this.init();
    }
    
    init() {
        if (!this.tocPanel || !this.tocList || !this.articleContent) {
            console.log('TOC elements not found');
            return;
        }
        
        this.generateTOC();
        this.bindEvents();
        this.initScrollSpy();
        // 编辑按钮将在管理员状态确认后初始化
    }
    
    generateTOC() {
        // 清空现有目录
        this.tocList.innerHTML = '';
        
        // 获取所有标题元素
        this.headings = this.articleContent.querySelectorAll('h1, h2, h3, h4, h5, h6');
        
        console.log('TOC Generation - Found headings:', this.headings.length);
        
        if (this.headings.length === 0) {
            // 如果没有标题，隐藏目录面板
            this.tocPanel.style.display = 'none';
            return;
        }
        
        // 显示目录面板
        this.tocPanel.style.display = 'block';
        
        // 创建目录列表
        const tocUl = document.createElement('ul');
        tocUl.className = 'toc-ul';
        
        this.headings.forEach((heading, index) => {
            // 为标题添加ID以便跳转
            if (!heading.id) {
                heading.id = this.generateAnchor(heading.textContent, index);
            }
            
            // 获取标题级别
            const level = parseInt(heading.tagName.charAt(1));
            
            // 创建目录项
            const tocItem = document.createElement('li');
            tocItem.className = `toc-item level-${level}`;
            
            // 创建链接
            const tocLink = document.createElement('a');
            tocLink.href = `#${heading.id}`;
            tocLink.textContent = heading.textContent;
            tocLink.dataset.target = heading.id;
            tocLink.className = 'toc-link';
            
            tocItem.appendChild(tocLink);
            tocUl.appendChild(tocItem);
        });
        
        this.tocList.appendChild(tocUl);
        
        // 更新标题位置
        this.updateHeadingPositions();
    }
    
    generateAnchor(title, index) {
        // 生成URL友好的锚点
        let anchor = title.toLowerCase()
            .replace(/[^\w\s-]/g, '')
            .replace(/[-\s]+/g, '-')
            .trim('-');
        
        if (!anchor) {
            anchor = `heading-${index}`;
        }
        
        return anchor;
    }
    
    bindEvents() {
        // 目录项点击事件
        this.tocList.addEventListener('click', (e) => {
            if (e.target.classList.contains('toc-link')) {
                e.preventDefault();
                const targetId = e.target.dataset.target;
                const targetElement = document.getElementById(targetId);
                
                if (targetElement) {
                    // 获取header高度
                    const headerHeight = parseInt(getComputedStyle(document.documentElement)
                        .getPropertyValue('--header-height')) || 70;
                    
                    // 计算目标位置，减去header高度的偏移
                    const targetPosition = targetElement.getBoundingClientRect().top + window.pageYOffset - headerHeight;
                    
                    // 平滑滚动到目标位置
                    window.scrollTo({
                        top: targetPosition,
                        behavior: 'smooth'
                    });
                    
                    // 更新活动状态
                    this.updateActiveTOCItem(targetId);
                }
            }
        });
        
        // 切换按钮点击事件
        if (this.toggleButton) {
            this.toggleButton.addEventListener('click', () => {
                this.toggleTOC();
            });
        }
    }
    
    toggleTOC() {
        this.isCollapsed = !this.isCollapsed;
        
        if (this.isCollapsed) {
            this.tocContent.style.display = 'none';
            this.tocIcon.textContent = '≡';
            this.tocPanel.classList.add('collapsed');
        } else {
            this.tocContent.style.display = 'block';
            this.tocIcon.textContent = '×';
            this.tocPanel.classList.remove('collapsed');
        }
    }
    
    initScrollSpy() {
        // 监听滚动事件
        let scrollTimeout;
        window.addEventListener('scroll', () => {
            if (scrollTimeout) {
                clearTimeout(scrollTimeout);
            }
            
            scrollTimeout = setTimeout(() => {
                this.updateHeadingPositions();
                this.updateActiveTOCItem();
            }, 100);
        });
        
        // 监听窗口大小变化
        window.addEventListener('resize', () => {
            this.updateHeadingPositions();
        });
    }
    
    updateHeadingPositions() {
        this.headingPositions = Array.from(this.headings).map(heading => {
            const rect = heading.getBoundingClientRect();
            return {
                element: heading,
                top: rect.top + window.pageYOffset
            };
        });
    }
    
    updateActiveTOCItem(activeId = null) {
        // 移除所有活动状态
        const tocLinks = this.tocList.querySelectorAll('.toc-link');
        tocLinks.forEach(link => {
            link.classList.remove('active');
        });
        
        if (!activeId) {
            // 获取header高度
            const headerHeight = parseInt(getComputedStyle(document.documentElement)
                .getPropertyValue('--header-height')) || 70;
            
            // 自动检测当前可见的标题，考虑header高度
            const scrollPosition = window.pageYOffset + headerHeight + 20; // 额外加一20px缓冲
            
            for (let i = this.headingPositions.length - 1; i >= 0; i--) {
                if (scrollPosition >= this.headingPositions[i].top) {
                    activeId = this.headingPositions[i].element.id;
                    break;
                }
            }
        }
        
        if (activeId) {
            // 添加活动状态到当前项
            const activeLink = this.tocList.querySelector(`.toc-link[data-target="${activeId}"]`);
            if (activeLink) {
                activeLink.classList.add('active');
                
                // 确保活动项在视图中
                this.scrollToActiveItem(activeLink);
            }
        }
    }
    
    scrollToActiveItem(activeLink) {
        const tocContent = this.tocContent;
        const containerRect = tocContent.getBoundingClientRect();
        const linkRect = activeLink.getBoundingClientRect();
        
        // 检查链接是否在容器视图中
        if (linkRect.bottom > containerRect.bottom) {
            // 如果链接在容器下方，向上滚动
            tocContent.scrollTop += linkRect.bottom - containerRect.bottom + 10;
        } else if (linkRect.top < containerRect.top) {
            // 如果链接在容器上方，向下滚动
            tocContent.scrollTop -= containerRect.top - linkRect.top + 10;
        }
    }
    
    // 初始化标题编辑按钮
    initTitleEditButtons() {
        // 临时：强制显示按钮进行调试
        console.log('开始初始化编辑按钮...');
        
        // 获取所有标题元素
        const headings = this.articleContent.querySelectorAll('h1, h2, h3, h4, h5, h6');
        
        console.log('找到标题数量:', headings.length);
        
        headings.forEach((heading, index) => {
            // 检查是否已经有编辑按钮
            if (heading.querySelector('.title-edit-btn')) {
                console.log('标题已有编辑按钮，跳过:', heading.textContent.substring(0, 20));
                return; // 已存在编辑按钮，跳过
            }
            
            // 确保标题有相对定位
            heading.style.position = 'relative';
            
            // 为每个标题添加编辑按钮
            const editBtn = document.createElement('button');
            editBtn.className = 'title-edit-btn force-visible'; // 强制显示用于调试
            editBtn.textContent = '编辑';
            editBtn.title = '编辑此标题';
            editBtn.style.cssText = `
                position: absolute;
                left: -45px;
                top: 50%;
                transform: translateY(-50%);
                background: #0067FB;
                color: white;
                border: none;
                border-radius: 4px;
                padding: 4px 8px;
                font-size: 12px;
                cursor: pointer;
                opacity: 1;
                visibility: visible;
                z-index: 1000;
                white-space: nowrap;
            `;
            
            // 添加点击事件
            editBtn.addEventListener('click', (e) => {
                e.preventDefault();
                e.stopPropagation();
                this.editHeading(heading);
            });
            
            heading.appendChild(editBtn);
            console.log('为标题添加编辑按钮:', heading.textContent.substring(0, 20), editBtn);
            
            // 检查按钮是否真的在DOM中
            setTimeout(() => {
                const rect = editBtn.getBoundingClientRect();
                const headingRect = heading.getBoundingClientRect();
                console.log('按钮位置信息:', {
                    button: rect,
                    heading: headingRect,
                    headingPosition: window.getComputedStyle(heading).position,
                    buttonInDOM: document.body.contains(editBtn),
                    buttonVisible: editBtn.offsetWidth > 0 && editBtn.offsetHeight > 0
                });
                
                // 尝试强制设置按钮位置
                editBtn.style.backgroundColor = 'red';
                editBtn.style.border = '2px solid yellow';
                editBtn.style.left = '10px'; // 移动到右侧进行测试
            }, 100);
        });
        
        console.log('编辑按钮初始化完成');
    }
    
    // 编辑标题功能
    editHeading(heading) {
        try {
            // 获取当前文章信息
            const currentUrl = window.location.pathname;
            const pathParts = currentUrl.split('/').filter(part => part.length > 0);
            
            if (pathParts.length < 3) {
                console.error('Invalid URL format');
                return;
            }
            
            const year = pathParts[0];
            const month = pathParts[1];
            const slug = pathParts[2];
            
            // 获取标题文本和ID
            const headingText = heading.textContent.replace('编辑', '').trim();
            const headingId = heading.id;
            
            console.log('编辑标题:', {
                year, month, slug,
                headingText, headingId
            });
            
            // 构建编辑页面URL
            const editUrl = `/edit/${year}/${month}/${slug}`;
            
            // 如果有标题ID，添加锥点参数
            const finalUrl = headingId ? `${editUrl}#${headingId}` : editUrl;
            
            console.log('跳转到编辑页面:', finalUrl);
            
            // 跳转到编辑页面
            window.location.href = finalUrl;
            
        } catch (error) {
            console.error('编辑标题失败:', error);
            alert('编辑功能暂时不可用，请稍后再试。');
        }
    }
}

// 生成目录的主函数（保持向后兼容）
function generateTOC() {
    if (window.tocManager) {
        window.tocManager.generateTOC();
    }
}

// 延迟生成TOC的函数
function generateTOCWithDelay(delay = 100) {
    return new Promise((resolve) => {
        setTimeout(function() {
            generateTOC();
            resolve();
        }, delay);
    });
}

// 使用 MutationObserver 监听内容变化
function observeContentChanges() {
    const content = document.getElementById('article-content');
    if (!content) return;
    
    const observer = new MutationObserver(function(mutations) {
        let shouldRegenerate = false;
        
        mutations.forEach(function(mutation) {
            if (mutation.type === 'childList') {
                // 检查是否有新的标题元素被添加
                mutation.addedNodes.forEach(function(node) {
                    if (node.nodeType === Node.ELEMENT_NODE) {
                        if (node.matches && node.matches('h1, h2, h3, h4, h5, h6')) {
                            shouldRegenerate = true;
                        } else if (node.querySelectorAll) {
                            const headings = node.querySelectorAll('h1, h2, h3, h4, h5, h6');
                            if (headings.length > 0) {
                                shouldRegenerate = true;
                            }
                        }
                    }
                });
            }
        });
        
        if (shouldRegenerate) {
            console.log('Content changed, regenerating TOC');
            generateTOCWithDelay(50);
        }
    });
    
    observer.observe(content, {
        childList: true,
        subtree: true
    });
}

// 确保在所有内容加载完成后生成TOC
document.addEventListener('DOMContentLoaded', function() {
    console.log('DOM Content Loaded');
    
    // 初始化目录管理器
    window.tocManager = new TOCManager();
    
    // 首先检查管理员状态
    checkAdminStatus();
    
    // 延迟再次生成TOC，确保所有内容都已渲染
    generateTOCWithDelay(500);
    
    // 启动内容变化监听
    observeContentChanges();
});

// 检查管理员状态的函数
function checkAdminStatus() {
    fetch('/admin/status')
        .then(response => response.json())
        .then(result => {
            const adminOnlyElements = document.querySelectorAll('.admin-only');
            adminOnlyElements.forEach(el => {
                el.style.display = result.logged_in ? 'flex' : 'none';
            });
            
            console.log('管理员状态检查完成:', result.logged_in);
            
            // 在tocManager初始化后初始化编辑按钮
            if (window.tocManager) {
                console.log('初始化编辑按钮...');
                setTimeout(() => {
                    window.tocManager.initTitleEditButtons();
                }, 500); // 稍微延迟以确保元素已渲染
            } else {
                console.log('tocManager 未初始化，将在稍后重试');
                // 如果tocManager还未初始化，稍后再试
                setTimeout(() => {
                    if (window.tocManager) {
                        window.tocManager.initTitleEditButtons();
                    }
                }, 1000);
            }
        })
        .catch(error => {
            console.error('Error checking admin status:', error);
        });
}

// 页面完全加载后再次生成TOC
window.addEventListener('load', function() {
    console.log('Window Load Event');
    generateTOCWithDelay(100);
});

// 如果 MathJax 存在，在其渲染完成后再次生成TOC
if (typeof MathJax !== 'undefined') {
    MathJax.startup.promise.then(() => {
        console.log('MathJax rendering completed');
        generateTOCWithDelay(100);
    }).catch(() => {
        // 如果 MathJax 出错，也生成TOC
        generateTOCWithDelay(100);
    });
}

// 修复：确保在所有资源加载完成后再次生成TOC
// 这可以解决伪代码导致的目录截断问题
setTimeout(function() {
    console.log('Final TOC generation after 2 seconds');
    generateTOCWithDelay(100);
}, 2000);

</script>
{% endblock %}
