{% extends "base.html" %}

{% block content %}
<div class="editor-container" style="background-color: #f5f5f5 !important;" 
     data-year="{{ post.year }}" 
     data-month="{{ post.month }}" 
     data-slug="{{ post.slug }}" 
     data-title="{{ post.title }}" 
     data-save-url="{{ url_for('save_post', year=post.year, month=post.month, slug=post.slug) }}" 
     data-preview-url="{{ url_for('preview_post', year=post.year, month=post.month, slug=post.slug) }}">
    <!-- 编辑器工具栏 -->
    <div class="editor-toolbar">
        <div class="toolbar-left">
            <button id="back-btn" class="btn btn-back" title="保存并返回">
                <span class="icon">←</span>
                Back
            </button>
            <h2 class="editor-title">编辑: {{ post.title }}</h2>
        </div>
        <div class="toolbar-right">
            <button id="save-btn" class="btn btn-save" disabled>
                <span class="icon">💾</span>
                保存
            </button>
            <a href="{{ url_for('post_detail', year=post.year, month=post.month, slug=post.slug) }}" 
               class="btn btn-cancel">
                <span class="icon">🔙</span>
                返回
            </a>
        </div>
    </div>

    <!-- 编辑器主体 -->
    <div class="editor-main">
        <!-- 左侧：Markdown编辑器和目录树 -->
        <div class="editor-pane">
            <div class="pane-header">
                <h3>Markdown 编辑器</h3>
                <div class="pane-tools">
                    <button id="format-bold" class="tool-btn" title="粗体">
                        <strong>B</strong>
                    </button>
                    <button id="format-italic" class="tool-btn" title="斜体">
                        <em>I</em>
                    </button>
                    <button id="format-link" class="tool-btn" title="链接">
                        🔗
                    </button>
                    <button id="format-code" class="tool-btn" title="代码">
                        &lt;/&gt;
                    </button>
                    <button id="format-math" class="tool-btn" title="数学公式">
                        ∑
                    </button>
                </div>
            </div>
            <div class="editor-with-toc">
                <!-- 目录树 -->
                <div class="toc-container">
                    <div class="toc-header">
                        <h4>目录</h4>
                        <button id="toggle-toc" class="toc-toggle" title="折叠/展开目录">≡</button>
                    </div>
                    <div id="toc-list" class="toc-list"></div>
                </div>
                <!-- 分隔线 -->
                <div class="editor-separator"></div>
                <!-- 编辑器 -->
                <textarea id="markdown-editor" class="markdown-textarea" 
                          placeholder="在此输入Markdown内容...">{{ raw_content }}</textarea>
            </div>
        </div>

        <!-- 右侧：预览窗格 -->
        <div class="preview-pane">
            <div class="pane-header">
                <h3>实时预览</h3>
                <div class="pane-tools">
                    <button id="refresh-preview" class="tool-btn" title="刷新预览">
                        🔄
                    </button>
                </div>
            </div>
            <div id="preview-content" class="preview-content">
                <!-- 预览内容将在这里动态加载 -->
                <div class="preview-loading">
                    正在加载预览...
                </div>
            </div>
        </div>
    </div>

    <!-- 状态栏 -->
    <div class="editor-status">
        <div class="status-left">
            <span id="char-count">字符数: 0</span>
            <span id="word-count">单词数: 0</span>
        </div>
        <div class="status-right">
            <span id="save-status">未保存的更改</span>
        </div>
    </div>
</div>

<script>
    // 初始化postData对象
    document.addEventListener('DOMContentLoaded', function() {
        const container = document.querySelector('.editor-container');
        window.postData = {
            year: parseInt(container.dataset.year),
            month: parseInt(container.dataset.month),
            slug: container.dataset.slug,
            title: container.dataset.title,
            saveUrl: container.dataset.saveUrl,
            previewUrl: container.dataset.previewUrl
        };
        
        // 添加主题监听器来动态更改编辑器背景色
        function updateEditorBackground() {
            const editorContainer = document.querySelector('.editor-container');
            const isDarkTheme = document.documentElement.classList.contains('dark-theme');
            
            console.log('Updating editor background, isDarkTheme:', isDarkTheme);
            
            if (editorContainer) {
                if (isDarkTheme) {
                    editorContainer.style.backgroundColor = '#1a1a1a';
                    console.log('Set background to dark: #1a1a1a');
                } else {
                    editorContainer.style.backgroundColor = '#f5f5f5';
                    console.log('Set background to light: #f5f5f5');
                }
            }
        }
        
        // 初始设置
        updateEditorBackground();
        
        // 监听主题变化
        const observer = new MutationObserver(function(mutations) {
            mutations.forEach(function(mutation) {
                if (mutation.type === 'attributes' && mutation.attributeName === 'class') {
                    console.log('Theme class changed, updating background');
                    updateEditorBackground();
                }
            });
        });
        
        observer.observe(document.documentElement, {
            attributes: true,
            attributeFilter: ['class']
        });
        
        // 也监听data-theme属性变化
        const dataObserver = new MutationObserver(function(mutations) {
            mutations.forEach(function(mutation) {
                if (mutation.type === 'attributes' && mutation.attributeName === 'data-theme') {
                    console.log('Theme data attribute changed, updating background');
                    updateEditorBackground();
                }
            });
        });
        
        dataObserver.observe(document.documentElement, {
            attributes: true,
            attributeFilter: ['data-theme']
        });
    });
</script>
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', filename='js/editor.js') }}"></script>
{% endblock %}
