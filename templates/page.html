{% extends "base.html" %}

{% block content %}
<article class="c-article">
    <header class="c-article__header">
        <h1 class="c-article__title">{{ page.title if page else title }}</h1>
    </header>

    <main class="c-article__main">
        {% if page and page.rendered_content %}
            {{ page.rendered_content | safe }}
        {% else %}
            <p>页面内容暂无。</p>
        {% endif %}
    </main>
</article>
{% endblock %}
