{% extends "base.html" %}

{% block content %}
<article class="c-article">
    <header class="c-article__header">
        <h1 class="c-article__title">管理员登录</h1>
    </header>

    <main class="c-article__main">
        <div class="login-container">
            <form id="login-form" class="login-form">
                <div class="form-group">
                    <label for="username">用户名</label>
                    <input type="text" id="username" class="form-input" required>
                </div>
                
                <div class="form-group">
                    <label for="password">密码</label>
                    <input type="password" id="password" class="form-input" required>
                </div>
                
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">登录</button>
                    <a href="{{ url_for('bookmarks') }}" class="btn btn-secondary">返回</a>
                </div>
            </form>
        </div>
    </main>
</article>

<style>
.login-container {
    max-width: 400px;
    margin: 40px auto;
    padding: 40px; /* 增加内边距从 30px 到 40px */
    border: 1px solid #DADDE1;
    border-radius: 8px;
    background: white;
}

.login-form {
    display: flex;
    flex-direction: column;
    gap: 20px;
}

.form-group {
    display: flex;
    flex-direction: column;
    gap: 5px;
}

.form-group label {
    font-size: 1.4rem;
    font-weight: 350;
    color: var(--text-color);
}

.form-input {
    padding: 10px 12px;
    border: 1px solid #ccc;
    border-radius: 4px;
    font-size: 1.4rem;
    font-family: inherit;
    background-color: white;
    transition: border-color 0.2s ease;
}

.form-input:focus {
    outline: none;
    border-color: var(--c-accent-blue);
    box-shadow: 0 0 0 2px rgba(0, 103, 251, 0.2);
}

.form-actions {
    display: flex;
    gap: 10px;
    margin-top: 10px;
}

.btn {
    padding: 10px 20px;
    border: none;
    border-radius: 4px;
    font-size: 1.4rem;
    font-weight: 350;
    font-family: inherit;
    cursor: pointer;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
}

.btn-primary {
    background-color: var(--c-accent-blue);
    color: white;
    flex: 1;
}

.btn-primary:hover {
    background-color: #0050C7;
}

.btn-secondary {
    background-color: #6c757d;
    color: white;
}

.btn-secondary:hover {
    background-color: #5a6268;
}

/* 深色主题支持 */
body.dark-theme .login-container {
    background: #2d2d2d;
    border-color: #444C56;
    color: var(--dark-theme-text);
}

body.dark-theme .form-input {
    background-color: #333;
    border-color: #555;
    color: var(--dark-theme-text);
}

body.dark-theme .form-input:focus {
    border-color: var(--dark-theme-link);
    box-shadow: 0 0 0 2px rgba(88, 166, 255, 0.2);
}

body.dark-theme .form-group label {
    color: var(--dark-theme-text);
}
</style>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const form = document.getElementById('login-form');
    
    form.addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        
        try {
            const response = await fetch('/admin/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ username, password })
            });
            
            const result = await response.json();
            
            if (result.success) {
                showMessage('登录成功，正在跳转...', 'success');
                setTimeout(() => {
                    window.location.href = '/bookmarks';
                }, 1000);
            } else {
                showMessage(result.error || '登录失败', 'error');
            }
        } catch (error) {
            console.error('Error:', error);
            showMessage('网络错误，请稍后重试', 'error');
        }
    });
    
    function showMessage(message, type = 'info') {
        // 创建消息提示
        const messageDiv = document.createElement('div');
        messageDiv.className = `message message-${type}`;
        messageDiv.textContent = message;
        
        // 添加样式
        messageDiv.style.cssText = `
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 20px;
            border-radius: 4px;
            color: white;
            font-weight: 500;
            z-index: 10000;
            animation: slideIn 0.3s ease;
        `;

        // 根据类型设置背景色
        switch (type) {
            case 'success':
                messageDiv.style.backgroundColor = '#28a745';
                break;
            case 'error':
                messageDiv.style.backgroundColor = '#dc3545';
                break;
            default:
                messageDiv.style.backgroundColor = '#17a2b8';
        }

        document.body.appendChild(messageDiv);

        // 3秒后自动移除
        setTimeout(() => {
            if (messageDiv.parentNode) {
                messageDiv.parentNode.removeChild(messageDiv);
            }
        }, 3000);
    }
});
</script>
{% endblock %}
