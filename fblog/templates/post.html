{% extends 'base.html' %}

{% block content %}
<article class="post">
    <h1>{{ post.title }}</h1>
    <div class="post-meta">
        <time datetime="{{ post.date.strftime('%Y-%m-%d') }}">
            {{ post.date.strftime('%Y年%m月%d日') }}
        </time>
    </div>
    <div class="post-content">
        {{ post.content|safe }}
    </div>
</article>
{% endblock %}
