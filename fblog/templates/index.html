{% extends 'base.html' %}

{% block content %}
    <div class="post-list">
        {% for post in posts %}
            <article class="post">
                <h2><a href="{{ url_for('show_post', slug=post.slug) }}">{{ post.title }}</a></h2>
                <div class="post-meta">
                    <time datetime="{{ post.date.strftime('%Y-%m-%d') }}">
                        {{ post.date.strftime('%Y年%m月%d日') }}
                    </time>
                </div>
                <div class="post-excerpt">
                    {{ post.content|safe|truncate(200) }}
                </div>
            </article>
        {% endfor %}
    </div>
{% endblock %}
